<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ShipManage — Quản lý đội tàu hàng rời nội địa</title>
    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0f19">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ShipManage">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="dark-theme">
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar glass-panel">
            <div class="sidebar-header">
                <div class="logo">
                    <i class="fa-solid fa-anchor"></i>
                    <span>ShipManage <small>V2.0</small></span>
                </div>
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" data-view="dashboard">
                    <i class="fa-solid fa-chart-pie"></i>
                    <span>Tổng quan</span>
                </a>
                <a href="#" class="nav-item" data-view="financials">
                    <i class="fa-solid fa-money-bill-transfer"></i>
                    <span>Theo dõi Tài chính</span>
                </a>
                <a href="#" class="nav-item" data-view="debts">
                    <i class="fa-solid fa-file-invoice-dollar"></i>
                    <span>Báo cáo Công nợ</span>
                </a>
                <a href="#" class="nav-item" data-view="fuel">
                    <i class="fa-solid fa-gas-pump"></i>
                    <span>Quản lý Nhiên liệu</span>
                </a>
                <a href="#" class="nav-item" data-view="shipments">
                    <i class="fa-solid fa-route"></i>
                    <span>Quản lý Chuyến hàng</span>
                </a>
                <a href="#" class="nav-item" data-view="partners">
                    <i class="fa-solid fa-users-rectangle"></i>
                    <span>NCC - Khách hàng</span>
                </a>
                <a href="#" class="nav-item" data-view="vessel-expenses">
                    <i class="fa-solid fa-wallet"></i>
                    <span>Quản lý Chi phí Tàu</span>
                </a>
                <a href="#" class="nav-item" data-view="monthly-costs">
                    <i class="fa-solid fa-calendar-days"></i>
                    <span>Chi phí theo Tháng</span>
                </a>
                <a href="#" class="nav-item" data-view="annual-costs">
                    <i class="fa-solid fa-calendar-check"></i>
                    <span>Chi phí Hàng năm</span>
                </a>
                <a href="#" class="nav-item" data-view="hr">
                    <i class="fa-solid fa-users"></i>
                    <span>Quản lý Nhân sự</span>
                </a>
                <a href="#" class="nav-item" data-view="salary">
                    <i class="fa-solid fa-money-check-dollar"></i>
                    <span>Chấm công & Lương</span>
                </a>
                <a href="#" class="nav-item" data-view="reports">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Báo cáo Tổng hợp</span>
                </a>
                <a href="#" class="nav-item" data-view="company">
                    <i class="fa-solid fa-building"></i>
                    <span>Master Data</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar">
                        <i class="fa-solid fa-user-gear"></i>
                    </div>
                    <div class="user-info">
                        <span class="user-name">Manager</span>
                        <span class="user-role">Administrator</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Lớp nền mờ khi mở menu trên mobile -->
        <div class="sidebar-backdrop" onclick="app.toggleSidebar(false)"></div>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header glass-panel">
                <div style="display:flex; align-items:center; gap:1rem;">
                    <button class="mobile-menu-btn" onclick="app.toggleSidebar()" aria-label="Menu"><i class="fa-solid fa-bars"></i></button>
                    <div class="header-company-info" id="header-company-info"></div>
                    <div class="header-search" style="position:relative;">
                        <i class="fa-solid fa-search"></i>
                        <input type="text" id="global-search-input" placeholder="Tìm kiếm tàu, chuyến, khách hàng, giao dịch..." autocomplete="off" oninput="app.globalSearch(this.value)" onkeydown="if(event.key==='Escape')app.closeSearch()">
                        <div id="global-search-results" class="search-results" style="display:none;"></div>
                    </div>
                </div>
                <div class="header-actions">
                    <div style="display: flex; align-items: center;">
                        <div class="server-status">
                            <span class="status-dot" style="background-color: #10b981; box-shadow: 0 0 10px #10b981; display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; vertical-align: middle;"></span> <span style="font-size: 0.85rem; font-weight: 500;">Offline (Local Mode)</span>
                        </div>
                    </div>
                    <span id="auth-user-badge" style="font-size: 0.8rem; color: var(--text-muted); margin: 0 8px; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
                    <button class="icon-btn theme-toggle"><i class="fa-regular fa-moon"></i></button>
                    <button class="icon-btn" title="Đăng xuất" onclick="signOutApp()"><i class="fa-solid fa-right-from-bracket"></i></button>
                    <button class="icon-btn"><i class="fa-solid fa-gear"></i></button>
                </div>
            </header>

            <!-- Dynamic Views Container -->
            <div id="view-container" class="view-container">
                <!-- Views will be injected here by JS -->
            </div>
        </main>

        <!-- Report Modal -->
        <div class="modal-overlay" id="report-modal" onclick="if(event.target===this)app.closeModal('report-modal')">
            <div class="modal" style="max-width: 950px; padding: 0;">
                <button class="no-print" onclick="app.closeModal('report-modal')" title="Đóng" style="position:absolute; top:10px; right:14px; z-index:5; background:#ef4444; color:#fff; border:none; width:34px; height:34px; border-radius:50%; font-size:1.1rem; cursor:pointer; line-height:1;">&times;</button>
                <div id="report-content"></div>
            </div>
        </div>

        <div class="modal-overlay" id="trans-modal">
            <div class="modal"><div id="trans-modal-content"></div></div>
        </div>

        <div class="modal-overlay" id="fuel-modal">
            <div class="modal"><div id="fuel-modal-content"></div></div>
        </div>

        <div class="modal-overlay" id="ship-modal">
            <div class="modal" style="max-width:900px;"><div id="ship-modal-content"></div></div>
        </div>

        <div class="modal-overlay" id="fuel-voyage-modal">
            <div class="modal"><div id="fuel-voyage-modal-content"></div></div>
        </div>

        <div class="modal-overlay" id="vessel-expense-modal">
            <div class="modal" style="max-width: 600px;"><div id="vessel-expense-modal-content"></div></div>
        </div>

        <div class="modal-overlay" id="vessel-modal">
            <div class="modal" style="max-width: 600px;"><div id="vessel-modal-content"></div></div>
        </div>

        <div class="modal-overlay" id="partner-modal">
            <div class="modal" style="max-width: 500px;"><div id="partner-modal-content"></div></div>
        </div>

        <div class="modal-overlay" id="employee-modal">
            <div class="modal" style="max-width: 600px;"><div id="employee-modal-content"></div></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <!-- Firebase SDK (compat) — cloud sync Hybrid V3 + Auth -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-analytics-compat.js"></script>

    <script src="js/seed-data.js"></script>
    <script src="js/data.js"></script>
    <script src="js/calc.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/views.js"></script>
    <script src="js/app.js"></script>
    <!-- Excel-style input: nhập công thức toán học vào ô số (=100+200, 500*3...) -->
    <script src="js/excel-input.js"></script>
    <!-- PWA: đăng ký service worker (offline + cài như app) -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function () {
          navigator.serviceWorker.register('sw.js').catch(function () {});
        });
      }
    </script>
</body>
</html>
